<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <nav>
            <a href="index.html">Logout / Home</a>
        </nav>
    </header>

    <main>
        <section id="resume-container">
            <div class="profile-header">
                <h1 id="display-name">[User Name]</h1>
                <p id="display-email">Email: <span>[user@email.com]</span></p>
                <p id="display-phone">Phone: <span>[Phone Number]</span></p>
            </div>

            <div class="resume-section">
                <h2>Education</h2>
                <ul id="display-education">
                    <li>B.Tech in Computer Science (Sample Data)</li>
                </ul>
            </div>

            <div class="resume-section">
                <h2>Skills</h2>
                <p id="display-skills">[Skill 1, Skill 2, Skill 3]</p>
            </div>

            <div class="resume-section">
                <h2>Projects</h2>
                <ul id="display-projects">
                    <li>Online Student Portfolio & Registration System</li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>Generated by Student Portfolio System</p>
    </footer>

    <script src="js/fetchData.js"></script>
</body>

</html>
