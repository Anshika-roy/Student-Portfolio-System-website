<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Back to Home</a>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Create Your Account</h2>
            <form id="registerForm" action="php/register.php" method="POST">
                
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="education">Education:</label>
                    <textarea id="education" name="education" rows="3" placeholder="e.g. B.Tech Computer Science, Diploma in Web Design" required></textarea>
                </div>

                <div class="form-group">
                    <label for="skills">Skills (comma separated):</label>
                    <textarea id="skills" name="skills" rows="3" placeholder="e.g. HTML, CSS, JavaScript, Python" required></textarea>
                </div>

                <div class="form-group">
                    <label for="certificates">Certificates (comma separated):</label>
                    <textarea id="certificates" name="certificates" rows="3" placeholder="e.g. AWS Cloud Practitioner, Google Data Analytics"></textarea>
                </div>

                <div class="form-group">
                    <label for="certificateImages">Certificate Image URLs (comma separated):</label>
                    <textarea id="certificateImages" name="certificateImages" rows="3" placeholder="e.g. https://example.com/cert1.jpg, https://example.com/cert2.jpg"></textarea>
                </div>

                <div class="form-group">
                    <label for="projectLinks">Projects (one per line as Title|URL):</label>
                    <textarea id="projectLinks" name="projectLinks" rows="4" placeholder="Portfolio Website|https://github.com/username/portfolio&#10;LinkedIn Profile|https://linkedin.com/in/username"></textarea>
                </div>

                <button type="submit" id="registerBtn">Register</button>
                <p id="error-message" style="color: red;"></p> </form>
            <p>Already have an account? <a href="login.html">Login here</a>.</p>
        </section>
    </main>

    <script src="js/validation.js"></script>
</body>
</html>
